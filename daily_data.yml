name: MLB Daily Data Collection

on:
  schedule:
    # Runs at 10:00 AM CT (15:00 UTC) — after morning probable pitchers are confirmed
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI or mobile

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pybaseball pandas beautifulsoup4 lxml

      - name: Collect MLB data
        run: python scripts/collect_data.py

      - name: Commit and push data
        run: |
          git config --global user.name  "MLB Data Bot"
          git config --global user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet || git commit -m "Data update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
