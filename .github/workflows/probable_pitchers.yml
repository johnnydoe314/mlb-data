name: MLB Probable Pitchers

on:
  schedule:
    # Every 30 min, 7:00 AM – 4:00 PM CT (CDT = UTC-5)
    # 7:00am-3:30pm CT = 12:00-20:30 UTC (same calendar day)
    - cron: '0,30 12-20 * * *'
    # 4:00pm CT = 21:00 UTC
    - cron: '0 21 * * *'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-pitchers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 && playwright install chromium --with-deps

      - name: Fetch probable pitchers
        run: python scripts/fetch_pitchers.py

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/probable_pitchers.csv
          if git diff --staged --quiet; then
            echo "No changes — pitchers unchanged"
          else
            git commit -m "Pitchers update $(date -u '+%H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully (attempt $i)"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts — giving up"
              exit 1
            fi
            echo "Push rejected (attempt $i) — remote has new commits, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict — needs manual resolution, aborting"
              exit 1
            fi
            sleep $((RANDOM % 5 + 2))
          done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
