name: MLB Odds Update

on:
  schedule:
    - cron: '0 15-23 * * *'   # 10:00am–6:00pm CT  (15:00–23:00 UTC)
    - cron: '0 0-1 * * *'     # 7:00pm–8:00pm CT   (00:00–01:00 UTC)
  workflow_dispatch:        # Manual trigger anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch MLB odds
        run: python scripts/fetch_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/odds.csv
          git diff --staged --quiet && echo "No changes to odds" || \
            (git commit -m "Odds update $(date -u '+%H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
