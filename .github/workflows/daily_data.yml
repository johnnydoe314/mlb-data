name: MLB Daily Data

on:
  schedule:
    - cron: '0 13 * * *'    # 8:00 AM CT  (full run — stats + bullpen + batting)
    - cron: '0 16 * * *'    # 11:00 AM CT (mid-morning refresh)
    - cron: '0 19 * * *'    # 2:00 PM CT  (afternoon refresh)
    - cron: '0 22 * * *'    # 5:00 PM CT  (pre-game refresh)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Fetch pitcher Statcast (stats.csv)
        continue-on-error: true
        run: python scripts/fetch_stats.py

      - name: Fetch exit velocity — batter + pitcher (exit_velocity_*.csv)
        continue-on-error: true
        run: python scripts/fetch_exit_velocity.py

      - name: Fetch batter Statcast + team batting with off_score (team_batting.csv)
        continue-on-error: true
        run: python scripts/fetch_statcast_hitting.py

      - name: Fetch bullpen xwOBA gaps (bullpen.csv)
        continue-on-error: true
        run: python scripts/fetch_bullpen.py

      - name: Fetch bullpen usage + fatigue (bullpen_fatigue.csv)
        continue-on-error: true
        run: python scripts/fetch_bullpen_usage.py

      - name: Fetch team platoon splits + pitcher handedness (team_platoon.csv, pitcher_hand.csv)
        continue-on-error: true
        run: python scripts/fetch_platoon_splits.py

      - name: Fetch injury/roster transaction notes (injury_notes.csv)
        continue-on-error: true
        run: python scripts/fetch_injury_notes.py

      - name: Log all games with composite scores (game_log.csv)
        run: python scripts/log_games.py

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily data $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully (attempt $i)"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts — giving up"
              exit 1
            fi
            echo "Push rejected (attempt $i) — remote has new commits, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict — needs manual resolution, aborting"
              exit 1
            fi
            sleep $((RANDOM % 5 + 2))
          done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
