name: MLB Daily Data Collection

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas
      - name: Collect stats
        run: python scripts/fetch_stats.py
      - name: Commit data
        run: |
          git config user.name "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet || git commit -m "Stats update $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
