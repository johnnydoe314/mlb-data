name: MLB Daily Data

on:
  schedule:
  # Every hour from 10:00am CT through 8:00pm CT
  - cron: '0 10-20 * * *'
    timezone: "America/Chicago"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch pitcher Statcast (stats.csv)
        run: python scripts/fetch_stats.py

      - name: Fetch bullpen xwOBA gaps (bullpen.csv)
        run: python scripts/fetch_bullpen.py

      - name: Fetch bullpen usage + fatigue (bullpen_fatigue.csv)
        run: python scripts/fetch_bullpen_usage.py

      - name: Fetch all odds — full game + F5 (odds.csv + f5_odds.csv)
        # 16 calls/day × 30 days = 480/month — within 500 free tier
        run: python scripts/fetch_all_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "Daily data $(date -u '+%Y-%m-%d')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
