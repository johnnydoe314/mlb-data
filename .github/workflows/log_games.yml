name: Log Games

on:
  # Runs automatically after Daily Data completes
  workflow_run:
    workflows: ["Daily Data"]
    types: [completed]

  # Or trigger manually — no inputs required
  workflow_dispatch:

jobs:
  log-games:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run log_games.py
        run: python scripts/log_games.py

      - name: Commit game log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/game_log.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Log games $(date -u +%Y-%m-%d) [bot]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully (attempt $i)"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts — giving up"
              exit 1
            fi
            echo "Push rejected (attempt $i) — remote has new commits, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict — needs manual resolution, aborting"
              exit 1
            fi
            sleep $((RANDOM % 5 + 2))
          done
          fi
