name: Manually Run Python Script

on:
  workflow_dispatch:
    inputs:
      script_path:
        description: 'Path to the script to run (e.g. scripts/fetch_rolling_stats.py)'
        required: false
        default: 'scripts/log_games.py'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Python script
        run: python ${{ github.event.inputs.script_path }}

      - name: Commit any new/changed data files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --staged --quiet || git commit -m "Manual run: ${{ github.event.inputs.script_path }} [bot]"
          git push || echo "Nothing to push"
