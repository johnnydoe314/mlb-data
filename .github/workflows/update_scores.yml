name: Update Scores

on:
  # 10am UTC = 5am CT — catches all overnight final scores (targets yesterday)
  schedule:
    - cron: '0 10 * * *'
  # 5am UTC = midnight CT — catches same-day late/west-coast games (targets today)
    - cron: '0 5 * * *'

  # Or trigger manually with an optional date override
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Date to score (YYYY-MM-DD, default: yesterday)'
        required: false
        default: ''

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run update_scores.py
        run: |
          # The 5am UTC / midnight CT run targets today; 10am UTC / 5am CT run
          # targets yesterday. Manual dispatch can pass an explicit date.
          HOUR=$(TZ=America/Chicago date +%H)
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            python scripts/update_scores.py --date "${{ github.event.inputs.game_date }}"
          elif [ "$HOUR" -le 1 ]; then
            # Midnight CT run — target today's games (just finished)
            TODAY=$(TZ=America/Chicago date +%Y-%m-%d)
            python scripts/update_scores.py --date "$TODAY"
          else
            # Morning run — target yesterday's games
            python scripts/update_scores.py
          fi

      - name: Commit updated scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/game_log.csv
          if git diff --staged --quiet; then
            echo "No score changes"
          else
            git commit -m "Update scores $(date -u +%Y-%m-%d) [bot]"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully (attempt $i)"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts — giving up"
              exit 1
            fi
            echo "Push rejected (attempt $i) — remote has new commits, rebasing and retrying..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict — needs manual resolution, aborting"
              exit 1
            fi
            sleep $((RANDOM % 5 + 2))
          done
          fi
