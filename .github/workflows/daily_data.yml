name: MLB Daily Data

on:
  schedule:
    # ── 10:00 AM CT ──────────────────────────────────────────────────────────
    # Full run: stats + bullpen + fatigue + odds
    # CDT (summer) = UTC-5  →  10am CT = 15:00 UTC
    - cron: '0 15 * * *'

    # ── 11:00 AM – 6:00 PM CT (hourly) ───────────────────────────────────────
    # Partial run: stats + bullpen + fatigue only (no odds — API budget)
    - cron: '0 16-23 * * *'

    # ── 7:00 PM – 8:00 PM CT (hourly) ────────────────────────────────────────
    # Crosses midnight UTC — split into separate cron entries
    - cron: '0 0-1 * * *'

  workflow_dispatch:   # always runs full pipeline when triggered manually

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch pitcher Statcast (stats.csv)
        run: python scripts/fetch_stats.py

      - name: Fetch bullpen xwOBA gaps (bullpen.csv)
        run: python scripts/fetch_bullpen.py

      - name: Fetch bullpen usage + fatigue (bullpen_fatigue.csv)
        run: python scripts/fetch_bullpen_usage.py

      # Odds only run at 10am CT (first cron) or on manual dispatch
      # This keeps The-Odds-API usage at 16 calls/day = 480/month (free tier: 500)
      - name: Fetch all odds — full game + F5 (odds.csv + f5_odds.csv)
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 15 * * *'
        run: python scripts/fetch_all_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log all games with composite scores (game_log.csv)
        # Runs after odds fetch — logs every game's composite + lines
        # Fills scores manually after games complete
        run: python scripts/log_games.py
        env:
          PYTHONPATH: .
