name: MLB Stats Update

on:
  schedule:
    - cron: '0 15 * * *'   # 10:00 AM CT daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch pitcher Statcast (stats.csv)
        run: python scripts/fetch_stats.py

      - name: Fetch probable pitchers (probable_pitchers.csv)
        run: python scripts/fetch_pitchers.py

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "Data update $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
