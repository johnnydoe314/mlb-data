name: MLB Daily Data

on:
  schedule:
    - cron: '0 15 * * *'    # 10:00 AM CT (full run — stats + odds)
    - cron: '0 19 * * *'    # 2:00 PM CT  (refresh bullpen/fatigue)
    - cron: '0 23 * * *'    # 6:00 PM CT  (pre-game refresh)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Fetch pitcher Statcast (stats.csv)
        run: python scripts/fetch_stats.py

      - name: Fetch exit velocity — batter + pitcher (exit_velocity_*.csv)
        run: python scripts/fetch_exit_velocity.py

      - name: Fetch team Statcast hitting (statcast_hitting_YEAR.csv)
        run: python scripts/fetch_statcast_hitting.py

      - name: Fetch bullpen xwOBA gaps (bullpen.csv)
        run: python scripts/fetch_bullpen.py

      - name: Fetch bullpen usage + fatigue (bullpen_fatigue.csv)
        run: python scripts/fetch_bullpen_usage.py

      - name: Fetch all odds — full game + F5 (odds.csv + f5_odds.csv)
        # 16 calls/day × 30 days = 480/month — within 500 free tier
        # Only runs on the 10am CT cron or manual dispatch
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event.schedule == '0 15 * * *'
        run: python scripts/fetch_all_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Log all games with composite scores (game_log.csv)
        run: python scripts/log_games.py

      - name: Commit and push
        run: |
          git config user.name  "MLB Data Bot"
          git config user.email "bot@mlb-data"
          git add data/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "Daily data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
